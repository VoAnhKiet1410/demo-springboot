<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Võ Anh Kiệt - Spring Boot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #22d3ee;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }
        .card p {
            color: #cbd5e1;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .highlight {
            color: #22d3ee;
            font-weight: 600;
        }
        .btn {
            display: inline-block;
            background: #22d3ee;
            color: #0f172a;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }
        .btn:hover {
            background: #06b6d4;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Võ Anh Kiệt</h1>
        <p class="subtitle">Trang test Spring Boot + Thymeleaf</p>

        <div class="card">
            <h2>Chào mừng</h2>
            <p>
                Đây là trang HTML và CSS cơ bản để bạn kiểm tra bài.
                Nếu thấy trang này và giao diện đẹp thì cấu hình đã chạy đúng.<br>
                <span class="highlight">Đây là dòng để test về GitHubAction</span>
            </p>
        </div>

        <div class="card">
            <h2>Trạng thái</h2>
            <p>Ứng dụng đã sẵn sàng.</p>
            <br>
            <a href="#" class="btn" onclick="alert('Test thành công!')">Bấm để test</a>
        </div>

        <p class="footer">Spring Boot 4 &middot; Thymeleaf</p>
    </div>
</body>
</html>
