name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt JDK để build dự án Spring Boot
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # Bước 3: Build dự án bằng Maven (tạo file JAR)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Bước 4: Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 5: Build và tag Docker Image
      - name: Build Docker Image
        run: |
          docker build -t dhope14102004/demo-springboot:latest -t dhope14102004/demo-springboot:${{ github.sha }} .

      # Bước 6: Push Docker Image lên Docker Hub
      - name: Push Docker Image to Docker Hub
        run: |
          docker push dhope14102004/demo-springboot:latest
          docker push dhope14102004/demo-springboot:${{ github.sha }}

      # Bước 7: Triển khai lên DevOps Classroom
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="dhope14102004/demo-springboot"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
